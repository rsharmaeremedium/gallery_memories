<!DOCTYPE html>
<html>
<head>
  <div class="header">
  <h2>📸 Memories</h2>

  <div class="auth">
    <button id="loginBtn">Login</button>
    <button id="logoutBtn" style="display:none;">Logout</button>
  </div>

  <p id="user"></p>
</div>
</head>

<body>

<!-- Top Bar -->
<div class="header">
  <h2>📸 Memories</h2>
  <p id="user"></p>
</div>

<!-- Gallery -->
<div id="gallery" class="gallery"></div>

<!-- Hidden Upload -->
<input type="file" id="upload" multiple accept="image/*" hidden>

<!-- Floating Button -->
<button id="uploadBtn">
  <span class="material-icons">add_a_photo</span>
</button>

<!-- Fullscreen Viewer -->
<div id="viewer" class="viewer" onclick="closeViewer()">
  <img id="viewerImg">
</div>

<script src="app.js"></script>
</body>
</html>
